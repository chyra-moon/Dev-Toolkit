<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-scheme="vscode" data-mode="single">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 对比与格式化</title>
    
    <!-- 引入刚刚下载到本地的 CodeMirror 样式 -->
    <link rel="stylesheet" href="../css/lib/codemirror.css">
    <link rel="stylesheet" href="../css/lib/foldgutter.css">
    <link rel="stylesheet" href="../css/lib/dialog.min.css">

    <link rel="stylesheet" href="../css/json-style.css">
</head>
<body>
    <div class="app-layout">
        <header class="app-header">
            <a href="../index.html" class="back-btn">← 返回工具箱</a>
            <h1 id="page-title">JSON 格式化</h1>
            <div class="global-actions">
                <button id="mode-toggle" class="icon-btn theme-toggle-btn mode-switch-btn" title="切换到对比模式">
                    <svg class="icon-to-compare" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="8" height="18" rx="1"></rect><rect x="14" y="3" width="8" height="18" rx="1"></rect><path d="M10 12h4" opacity="0.5"></path></svg>
                    <svg class="icon-to-single" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1"></rect></svg>
                </button>
                <button id="theme-toggle" class="icon-btn theme-toggle-btn" title="切换深色/浅色模式">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button id="settings-btn" class="icon-btn" title="偏好设置">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
                <button class="primary-btn" id="action-btn" style="width: 140px; text-align: center;">格式化</button>
            </div>
        </header>

        <main class="editor-container">
            <div class="editor-panel">
                <div class="panel-toolbar">
                    <span class="panel-title" id="left-panel-title">JSON 编辑器</span>
                    <div class="panel-actions" style="display: flex; gap: 8px;">
                        <button class="icon-btn tool-btn" id="clear-left" title="清空">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                        <button class="icon-btn tool-btn" id="format-left" title="格式化">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                        </button>
                        <button class="icon-btn tool-btn" id="copy-left" title="复制">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                        <button class="icon-btn tool-btn" id="search-left" title="查找">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </button>
                    </div>
                </div>
                <div class="editor-wrapper">
                    <!-- 内置一段供测试多级折叠和主题预览的 JSON -->
                    <textarea id="json-input-left">{
  "name": "Dev-Toolkit",
  "version": "2.0.0",
  "description": "轻量纯本地开发者数据工具箱",
  "features": [
    {
      "module": "JSON 格式化",
      "status": "active",
      "capabilities": ["beautify", "minify", "validate", "escape"]
    },
    {
      "module": "JSON 差异比对",
      "status": "active",
      "capabilities": ["deep-diff", "array-smart-match", "char-highlight"]
    }
  ],
  "settings": {
    "theme": "vscode",
    "fontSize": 14,
    "tabSize": 4
  },
  "tip": "点击右上角双栏图标可切换到对比模式"
}</textarea>
                </div>
            </div>

            <div class="editor-panel">
                <div class="panel-toolbar">
                    <span class="panel-title">目标 JSON</span>
                    <div class="panel-actions" style="display: flex; gap: 8px;">
                        <button class="icon-btn tool-btn" id="clear-right" title="清空">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                        <button class="icon-btn tool-btn" id="format-right" title="格式化">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                        </button>
                        <button class="icon-btn tool-btn" id="copy-right" title="复制">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                        <button class="icon-btn tool-btn" id="search-right" title="查找">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </button>
                    </div>
                </div>
                <div class="editor-wrapper">
                    <textarea id="json-input-right"></textarea>
                </div>
            </div>
        </main>
    </div>

    <!-- 偏好设置 Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal large-modal">
            <div class="modal-header">偏好设置</div>
            <div class="modal-body with-sidebar">
                <div class="settings-sidebar">
                    <div class="tab-btn active" data-target="pane-appearance">外观与布局</div>
                    <div class="tab-btn" data-target="pane-shortcuts">自定义快捷键</div>
                </div>
                <div class="settings-content">
                    <!-- 1. 外观与布局 面板 -->
                    <div id="pane-appearance" class="settings-pane active">
                        <div class="setting-item">
                            <label>色彩主题</label>
                            <select id="scheme-select">
                                <option value="vscode">VS Code 经典</option>
                                <option value="onedark">One Dark 科技风</option>
                                <option value="github">GitHub 极简</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>代码字体</label>
                            <select id="font-select">
                                <option value="Consolas, 'Courier New', monospace">Consolas</option>
                                <option value="Menlo, Monaco, monospace">Menlo / Monaco</option>
                                <option value="'SF Mono', monospace">SF Mono</option>
                                <option value="'Fira Code', monospace">Fira Code</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>字号大小</label>
                            <div class="setting-control">
                                <input type="range" id="font-size-slider" min="12" max="24" value="14" style="cursor:pointer; flex: 1;">
                                <span id="font-size-val" style="font-size:14px; color:var(--text-secondary); width:35px; white-space:nowrap; text-align: right;">14px</span>
                            </div>
                        </div>
                        <div class="setting-item">
                            <label>缩进大小</label>
                            <div class="setting-control">
                                <input type="range" id="tab-size-slider" min="2" max="8" step="1" value="4" style="cursor:pointer; flex: 1;">
                                <span id="tab-size-val" style="font-size:14px; color:var(--text-secondary); width:35px; white-space:nowrap; text-align: right;">4</span>
                            </div>
                        </div>
                    </div>

                    <!-- 2. 快捷键 面板 -->
                    <div id="pane-shortcuts" class="settings-pane">
                        <div style="font-size:12px; color:var(--text-secondary); margin-bottom:15px; text-align:center;">点击输入框后，直接在键盘上按下你想要的快捷键组合即可重新录制。</div>
                        
                        <div class="setting-item">
                            <label>折叠代码 (1级)</label>
                            <input type="text" id="shortcut-lv1" class="shortcut-input" readonly value="Alt+1">
                        </div>
                        <div class="setting-item">
                            <label>折叠代码 (2级)</label>
                            <input type="text" id="shortcut-lv2" class="shortcut-input" readonly value="Alt+2">
                        </div>
                        <div class="setting-item">
                            <label>展开全部代码</label>
                            <input type="text" id="shortcut-unfold" class="shortcut-input" readonly value="Alt+3">
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="primary-btn" id="close-settings">完成</button>
            </div>
        </div>
    </div>

    <!-- 引入 CodeMirror 核心与插件 -->
    <script src="../js/lib/codemirror.js"></script>
    <script src="../js/lib/javascript.js"></script>
    <script src="../js/lib/foldcode.js"></script>
    <script src="../js/lib/foldgutter.js"></script>
    <script src="../js/lib/brace-fold.js"></script>
    <script src="../js/lib/dialog.min.js"></script>
    <script src="../js/lib/searchcursor.min.js"></script>
    <script src="../js/lib/search.min.js"></script>
    
    <!-- 引入我们刚才编写的自定义脚本 -->
    <script src="../js/json-script.js"></script>
</body>
</html>
